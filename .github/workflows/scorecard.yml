# OpenSSF Scorecard — supply-chain security posture.
# Runs on schedule + branch-protection changes (NOT on every push). Most checks and
# publish_results require a PUBLIC repo, so this effectively goes live at v1 launch;
# kept here pinned and ready. Results surface in the Security tab and on the badge.
name: Scorecard

on:
  branch_protection_rule:
  schedule:
    - cron: '27 5 * * 1' # weekly, Mondays
  workflow_dispatch:

# Read-only by default; the job elevates only what it needs.
permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write # upload SARIF to the Security tab
      id-token: write        # publish results to the OpenSSF API (public repos)
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # Publishing to the public OpenSSF webapp 400s on this repo (fresh/unregistered
          # + non-scheduled runs). Keep the local scan + SARIF→code-scanning upload; skip
          # the flaky external publish. Re-enable if you want the public Scorecard badge.
          publish_results: false

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: Upload to code-scanning
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v3
        with:
          sarif_file: results.sarif
