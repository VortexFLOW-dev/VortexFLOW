name: Sentinel (online)

# The Contract Drift Sentinel's docker/network checks (A2 schema-vs-real-binary,
# A3 newer-version-available). Kept OUT of per-PR CI so pulls/network don't slow
# every push — run weekly and on demand.
on:
  schedule:
    - cron: '0 6 * * 1' # Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sentinel-online:
    name: Contract drift · online (schema + version)
    runs-on: ubuntu-latest # has docker + network
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: System deps (xmlsec for python3-saml)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends pkg-config libxml2-dev libxmlsec1-dev

      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      # A2 runs the pinned `timberio/vector:<ver>` image's generate-schema and
      # diffs it against the committed schema; A3 reports if a newer Vector exists.
      - name: Sentinel (online checks)
        run: |
          export VORTEXFLOW_SECRET_KEY="$(openssl rand -hex 32)"
          PYTHONPATH=backend:. python -m contracts.sentinel check --online
