# Black Duck (Synopsys/Black Duck) SCA + license scan — Phase C3.
#
# Manual-trigger only until the Black Duck instance + token are wired, so it never
# fails on missing secrets. To enable:
#   1. Add repo secrets BLACKDUCK_URL and BLACKDUCK_API_TOKEN (Settings → Secrets).
#   2. Optionally add a `schedule:` trigger below for periodic full scans.
#   3. Confirm the action version/inputs against your Black Duck server version
#      (the official action is `blackduck-inc/black-duck-security-scan`).
name: Black Duck

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    name: Black Duck SCA
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Black Duck scan
        uses: blackduck-inc/black-duck-security-scan@3fe94e4b3c3947bd21ba46b7da255d6d3638b325 # v2
        with:
          blackduck_url: ${{ secrets.BLACKDUCK_URL }}
          blackduck_token: ${{ secrets.BLACKDUCK_API_TOKEN }}
          blackduck_scan_full: true
