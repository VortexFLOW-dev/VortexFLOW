name: Licenses & SCA

# Free stand-in for the license-compliance part of a Black Duck scan: fail the
# build if any dependency carries a strong-copyleft license incompatible with
# bundling/redistribution under MPL 2.0 (GPL/AGPL/EUPL/SSPL) — LGPL is allowed.
# Plus an informational Trivy SCA pass (Dependabot is the gating dep-vuln channel).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '24 6 * * 2'

permissions:
  contents: read

jobs:
  licenses:
    name: License compliance (no strong copyleft)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # ── Backend (Python) ──
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: System deps (xmlsec for python3-saml)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends pkg-config libxml2-dev libxmlsec1-dev

      - name: Install backend deps
        run: pip install -r backend/requirements.txt pip-licenses

      - name: Backend license report
        run: pip-licenses --format=markdown --order=license | tee backend-licenses.md

      - name: Backend license gate
        run: |
          BAD=$(pip-licenses --format=csv | tail -n +2 \
            | grep -iE "GPL|Affero|General Public License|EUPL|CDDL|SSPL" \
            | grep -ivE "Lesser|LGPL" || true)
          if [ -n "$BAD" ]; then
            echo "::error::Backend has disallowed strong-copyleft license(s):"
            echo "$BAD"
            exit 1
          fi
          echo "✓ Backend: no strong copyleft (LGPL allowed)."

      # ── Frontend (JS/TS) ──
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: 10

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend deps
        run: cd frontend && pnpm install --frozen-lockfile

      - name: Frontend license report
        run: cd frontend && npx --yes license-checker-rseidelsohn@5.0.1 --production --markdown > ../frontend-licenses.md || true

      - name: Frontend license gate
        run: |
          cd frontend
          npx --yes license-checker-rseidelsohn@5.0.1 --production \
            --failOn 'GPL-1.0;GPL-2.0;GPL-3.0;GPL-2.0-only;GPL-2.0-or-later;GPL-3.0-only;GPL-3.0-or-later;AGPL-1.0;AGPL-3.0;AGPL-3.0-only;AGPL-3.0-or-later;EUPL-1.2;SSPL-1.0'
          echo "✓ Frontend: no strong copyleft."

      - name: Upload license reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: license-reports
          path: '*-licenses.md'

  sca:
    name: SCA · Trivy (informational)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Trivy filesystem scan (vulns)
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        continue-on-error: true
        with:
          scan-type: fs
          scanners: vuln
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '0'
          format: table
