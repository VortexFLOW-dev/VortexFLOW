name: CodeQL

# NOTE: GitHub code scanning is free for PUBLIC repos; on a private repo it needs
# GitHub Advanced Security. Until this repo is public (Phase D), CodeQL runs only on
# a weekly schedule + manual trigger so it doesn't redden every push. When public,
# add `push`/`pull_request` triggers to gate PRs on it.
on:
  workflow_dispatch:
  schedule:
    # Weekly, Monday 06:24 UTC.
    - cron: '24 6 * * 1'

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze · ${{ matrix.language }}
    runs-on: ubuntu-latest
    permissions:
      contents: read          # checkout
      security-events: write  # upload CodeQL SARIF
    strategy:
      fail-fast: false
      matrix:
        language: [python, javascript-typescript]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          language: ${{ matrix.language }}
          queries: security-and-quality

      # Python + JS/TS are interpreted — no build step needed; autobuild is a no-op.
      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: "/language:${{ matrix.language }}"
