name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  # Cancel superseded runs on a PR branch (rapid iteration), but let every push to
  # main run to completion so each commit gets a real, un-cancelled result.
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  backend:
    name: Backend · lint · types · tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: System deps (xmlsec for python3-saml)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends pkg-config libxml2-dev libxmlsec1-dev

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff==0.15.17 mypy==1.13.0 'sqlalchemy[mypy]' pytest

      - name: Ruff (lint)
        run: ruff check app

      - name: Ruff (format check)
        run: ruff format --check app

      - name: Unit tests
        # Generate a throwaway key at runtime (settings need one at import) — never
        # a hardcoded secret in the workflow file.
        run: |
          export VORTEXFLOW_SECRET_KEY="$(openssl rand -hex 32)"
          PYTHONPATH=. pytest -q

      # mypy has known full-app gaps the per-file pre-commit hook doesn't hit;
      # surfaced here but not yet gating (tracked for cleanup).
      - name: Mypy (informational)
        run: mypy app
        continue-on-error: true

  sentinel:
    name: Contract drift · sentinel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: System deps (xmlsec for python3-saml)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends pkg-config libxml2-dev libxmlsec1-dev

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt pytest

      # Pure-Python, offline: no docker, no node, no DB. Reads committed artifacts
      # (catalog manifest, allowlist, models, baseline) and fails on drift.
      - name: Sentinel (P1 drift checks)
        run: |
          export VORTEXFLOW_SECRET_KEY="$(openssl rand -hex 32)"
          PYTHONPATH=backend:. python -m contracts.sentinel check

      - name: Sentinel self-tests (drift injection)
        run: |
          export VORTEXFLOW_SECRET_KEY="$(openssl rand -hex 32)"
          PYTHONPATH=backend:. pytest contracts/tests -q

  frontend:
    name: Frontend · types · build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: 10

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm tsc --noEmit

      - name: Build
        run: pnpm build

      # eslint has a known pre-existing finding; informational until cleaned up.
      - name: ESLint (informational)
        run: pnpm lint
        continue-on-error: true

  agent:
    name: Agent · vet · build · test · scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # The Go agent runs as root on fleet hosts, so its safety checks (e.g.
      # confining server-supplied cert paths to the managed dir) must be tested +
      # scanned. Build in the golang container — mirrors the Makefile
      # `agent-build` fallback — so no separate toolchain pin is needed.
      - name: Go vet · build · test · govulncheck (golang container)
        run: |
          docker run --rm -v "$PWD/agent":/src -w /src -e CGO_ENABLED=0 \
            golang:1.26 sh -c '
              go vet ./... &&
              go build -o /tmp/agent . &&
              go test ./... &&
              go run golang.org/x/vuln/cmd/govulncheck@v1.5.0 ./...'

      # gosec is a security linter; the agent has known low-severity G104
      # (unhandled error on best-effort cleanup) findings, so surface it
      # informationally rather than gating — same convention as mypy/eslint here.
      - name: gosec (informational)
        continue-on-error: true
        run: |
          docker run --rm -v "$PWD/agent":/src -w /src -e CGO_ENABLED=0 \
            golang:1.26 sh -c \
            'go run github.com/securego/gosec/v2/cmd/gosec@latest -quiet ./...'

  secrets:
    name: Secret scan · gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: Gitleaks (full history)
        run: |
          # safe.directory via env so git inside the container trusts the
          # CI-owned checkout (avoids "detected dubious ownership").
          docker run --rm -v "$PWD":/repo \
            -e GIT_CONFIG_COUNT=1 \
            -e GIT_CONFIG_KEY_0=safe.directory \
            -e GIT_CONFIG_VALUE_0='*' \
            ghcr.io/gitleaks/gitleaks:v8.30.1 \
            git /repo --config /repo/.gitleaks.toml --redact
