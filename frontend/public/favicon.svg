<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <circle cx="16" cy="16" r="16" fill="#09090b"/>
  <!-- outer arc: ~70% sweep -->
  <circle cx="16" cy="16" r="13" fill="none" stroke="#0f766e" stroke-width="1.5"
    stroke-dasharray="57 25" stroke-linecap="round"/>
  <!-- middle arc: ~50% sweep, offset 100° -->
  <circle cx="16" cy="16" r="9" fill="none" stroke="#0d9488" stroke-width="2"
    stroke-dasharray="28 29" stroke-linecap="round" transform="rotate(100 16 16)"/>
  <!-- inner arc: ~30% sweep, offset 220° -->
  <circle cx="16" cy="16" r="5" fill="none" stroke="#14b8a6" stroke-width="2.5"
    stroke-dasharray="10 22" stroke-linecap="round" transform="rotate(220 16 16)"/>
  <!-- center eye -->
  <circle cx="16" cy="16" r="2" fill="#14b8a6"/>
</svg>
