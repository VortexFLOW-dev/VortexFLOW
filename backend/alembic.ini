# Alembic configuration for VortexFlow.
#
# The database URL is NOT set here — env.py pulls it from the application
# settings (VORTEXFLOW_DATABASE_URL / config.yaml) so there is a single source
# of truth. Migrations normally run automatically on backend startup; this file
# is for the developer CLI (`alembic revision --autogenerate`, `alembic check`).

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# sqlalchemy.url is injected by env.py from app settings — leave blank.
sqlalchemy.url =

# No post_write_hooks: ruff ships as a native binary (not a console_scripts
# entry point), so alembic's hook can't resolve it. `make migration` runs
# `ruff format`/`--fix` on the generated file instead, matching the pre-commit hook.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
