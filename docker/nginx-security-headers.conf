# Security response headers, included by both the :80 and :443 server blocks.
# `always` so they're sent on error responses too. HSTS is set only on the 443
# block (sending it over plain HTTP is meaningless).
#
# CSP notes:
#  - Monaco (the VRL editor) is now bundled locally — no external script/CDN.
#    script-src is therefore 'self' only (no jsdelivr, no 'unsafe-inline').
#  - style-src needs 'unsafe-inline' for React Flow / Monaco injected styles and
#    React inline style attributes.
#  - worker-src/child-src blob: for Monaco's web workers (Vite emits them as
#    blob: workers).

add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "DENY" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; worker-src 'self' blob:; child-src blob:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;
