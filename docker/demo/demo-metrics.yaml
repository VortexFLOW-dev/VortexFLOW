# Demo agent self-monitoring (static, host-specific) — mirrors the leader's
# vector-leader.yaml pattern. Runs ALONGSIDE the agent-managed fleet config
# (/tmp/vortexflow.yaml). `internal_metrics` reports on the WHOLE Vector
# process, so it counts events flowing through the *fleet* pipeline too —
# tagged host="demo-agent" so the Health dashboard attributes throughput to
# this instance. Not for production; the real install writes its own metrics
# config per host.

data_dir: /var/lib/vector

# Expose Vector's API on the address this instance registered with
# (http://demo-agent:8686) so VortexFlow's per-instance health probe and Live
# Tap / topology can reach it. Demo only — bound to all interfaces on the
# internal compose network.
api:
  enabled: true
  address: 0.0.0.0:8686

sources:
  vf_internal:
    type: internal_metrics

transforms:
  vf_tag:
    type: remap
    inputs: [vf_internal]
    source: |
      .tags.host = "${VF_HOST_TAG:-demo-agent}"

sinks:
  vf_vm:
    type: prometheus_remote_write
    inputs: [vf_tag]
    endpoint: http://victoriametrics:8428/api/v1/write
