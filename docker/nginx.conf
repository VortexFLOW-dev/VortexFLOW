# VortexFlow front door: serves the SPA and reverse-proxies the backend + the
# metrics remote-write path, on both HTTP (80) and HTTPS (443).
#
# TLS uses the cert in /etc/nginx/certs (shared volume). The backend generates a
# self-signed CA + cert there on first boot (agents trust the CA via the install
# script); drop in a real cert to replace it. Both ports serve everything so the
# agent bootstrap works without cert hassle; for a hardened setup, redirect 80→443.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;
    client_max_body_size 25m;
    root /usr/share/nginx/html;
    index index.html;
    include /etc/nginx/vortexflow-security-headers.conf;
    include /etc/nginx/vortexflow-locations.conf;
}

server {
    listen 443 ssl;
    server_name _;
    client_max_body_size 25m;
    root /usr/share/nginx/html;
    index index.html;

    ssl_certificate     /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    include /etc/nginx/vortexflow-security-headers.conf;
    # HSTS only on HTTPS. 1 year; add `; preload` once the domain is submitted.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    include /etc/nginx/vortexflow-locations.conf;
}
