# VortexFlow front door: serves the SPA and reverse-proxies the backend + the
# metrics remote-write path, on both HTTP (80) and HTTPS (443).
#
# TLS uses the cert in /etc/nginx/certs (shared volume). The backend generates a
# self-signed CA + cert there on first boot (agents trust the CA via the install
# script); drop in a real cert to replace it. Both ports serve everything so the
# agent bootstrap works without cert hassle; for a hardened setup, redirect 80→443.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Whether a request on :80 should be redirected to https when VORTEXFLOW_FORCE_HTTPS
# is enabled. Human/SPA traffic (default 1) is redirected so credentials and the
# session never travel in cleartext; the agent bootstrap + metrics paths (0) stay
# on http, since a freshly-installing host has not yet been given a cert to trust.
map $request_uri $vf_force_redirect {
    default            1;
    ~^/install/        0;
    ~^/vm/api/v1/write 0;
    ~^/api/v1/agent/   0;
}

server {
    listen 80;
    server_name _;
    client_max_body_size 25m;
    root /usr/share/nginx/html;
    index index.html;
    include /etc/nginx/vortexflow-security-headers.conf;
    # Populated by the entrypoint: a redirect-to-https `if` when
    # VORTEXFLOW_FORCE_HTTPS is set, empty otherwise (default: serve both ports).
    include /etc/nginx/vortexflow-force-https.conf;
    include /etc/nginx/vortexflow-locations.conf;
}

server {
    listen 443 ssl;
    server_name _;
    client_max_body_size 25m;
    root /usr/share/nginx/html;
    index index.html;

    ssl_certificate     /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    include /etc/nginx/vortexflow-security-headers.conf;
    # HSTS only on HTTPS. 1 year; add `; preload` once the domain is submitted.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    include /etc/nginx/vortexflow-locations.conf;
}
