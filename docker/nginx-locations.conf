# Shared location blocks, included by both the :80 and :443 server blocks.

# API + agent install script & binary download → backend.
location /api/ {
    proxy_pass http://backend:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # Streaming endpoints (live tap = SSE) and any WebSocket upgrades.
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_buffering off;
    proxy_read_timeout 1h;
}

location /install/ {
    proxy_pass http://backend:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# Agent metrics remote-write. Strip the /vm prefix so /vm/api/v1/write maps to
# VictoriaMetrics' /api/v1/write (note the trailing slash on proxy_pass).
location /vm/ {
    proxy_pass http://victoriametrics:8428/;
    proxy_set_header Host $host;
}

# SPA — client-side routing fallback.
location / {
    try_files $uri $uri/ /index.html;
}
