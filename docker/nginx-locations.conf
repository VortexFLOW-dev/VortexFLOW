# Shared location blocks, included by both the :80 and :443 server blocks.

# The /vm write gate's auth subrequest target must not be reachable directly, or
# it becomes an unrate-limited bearer-token oracle (200 vs 401 leaks validity).
# The internal /_vm_authz proxies straight to backend:8000, so this 404 only
# blocks external callers.
location = /api/v1/vm/authorize {
    return 404;
}

# API + agent install script & binary download → backend.
location /api/ {
    proxy_pass http://backend:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # Streaming endpoints (live tap = SSE) and any WebSocket upgrades.
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_buffering off;
    proxy_read_timeout 1h;
}

location /install/ {
    proxy_pass http://backend:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# Agent metrics remote-write — the write endpoint ONLY. Agents only ever POST to
# /vm/api/v1/write; VictoriaMetrics' query, export, and admin APIs (including the
# destructive /api/v1/admin/tsdb/delete_series, enabled by default on single-node
# VM) must never be reachable from the public front door.
location = /vm/api/v1/write {
    # Gate the write path: the backend approves (200) when no metrics-write token
    # is configured (open, historical behavior) or when the caller presents a
    # matching bearer, else 401 — so anonymous metric-poisoning is refused.
    auth_request /_vm_authz;
    proxy_pass http://victoriametrics:8428/api/v1/write;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# Internal auth subrequest for the write path — never directly reachable. The
# request body is dropped (only the Authorization header is inspected) to keep
# the check cheap on the metrics hot path.
location = /_vm_authz {
    internal;
    proxy_pass http://backend:8000/api/v1/vm/authorize;
    proxy_pass_request_body off;
    proxy_set_header Content-Length "";
    proxy_set_header Authorization $http_authorization;
}

# Everything else under /vm/ (query, export, admin/*) is not publicly exposed.
location /vm/ {
    return 404;
}

# SPA — client-side routing fallback.
location / {
    try_files $uri $uri/ /index.html;
}
